<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
      color: #333;
      background: #f9fafb;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Header */
    .header {
      background: linear-gradient(135deg, #1a5276 0%, #2e86c1 100%);
      color: white;
      padding: 2rem 1.2rem 1.5rem;
      text-align: center;
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.3rem; }
    .header p { font-size: 0.85rem; opacity: 0.85; }

    /* Content */
    .content {
      max-width: 720px;
      margin: 0 auto;
      padding: 1.2rem 1rem 3rem;
      background: white;
      min-height: 100vh;
    }

    /* Typography */
    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a5276;
      margin: 1.8rem 0 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 2px solid #2e86c1;
    }
    h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: #2e86c1;
      margin: 1.5rem 0 0.6rem;
    }
    h3 {
      font-size: 1rem;
      font-weight: 700;
      color: #444;
      margin: 1.2rem 0 0.5rem;
    }
    p { margin: 0.5rem 0; font-size: 0.9rem; }
    a { color: #2e86c1; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.5rem 0;
    }

    /* Lists */
    ul, ol { padding-left: 1.5rem; margin: 0.5rem 0; }
    li { font-size: 0.9rem; margin: 0.3rem 0; }
    
    /* Checkbox lists */
    ul li { list-style: none; margin-left: -1.2rem; }
    li input[type="checkbox"] { margin-right: 0.4rem; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 0.8rem 0;
      font-size: 0.85rem;
    }
    th {
      background: #1a5276;
      color: white;
      font-weight: 600;
      text-align: left;
      padding: 0.5rem 0.6rem;
      font-size: 0.8rem;
    }
    td {
      padding: 0.5rem 0.6rem;
      border-bottom: 1px solid #e5e7eb;
      vertical-align: top;
    }
    tr:nth-child(even) { background: #f8f9fa; }
    tr:hover { background: #eef4f9; }

    /* Blockquotes */
    blockquote {
      background: #fff8e1;
      border-left: 4px solid #f5a623;
      padding: 0.7rem 1rem;
      margin: 0.8rem 0;
      border-radius: 0 6px 6px 0;
      font-size: 0.85rem;
    }
    blockquote p { margin: 0.2rem 0; }

    /* Code blocks (for WhatsApp templates) */
    pre {
      background: #f4f6f8;
      border: 1px solid #e1e4e8;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      overflow-x: auto;
      font-size: 0.8rem;
      line-height: 1.5;
      margin: 0.6rem 0;
    }
    code {
      font-family: "SF Mono", Menlo, monospace;
      font-size: 0.82rem;
      background: #f0f2f4;
      padding: 0.15rem 0.35rem;
      border-radius: 3px;
    }
    pre code { background: none; padding: 0; }

    /* Back link */
    .content > p:first-child a {
      display: inline-block;
      background: #eef4f9;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      font-size: 0.82rem;
      margin-bottom: 0.5rem;
    }

    /* Strong in tables */
    strong { color: #1a5276; }

    /* Emoji sizing */
    .content { font-variant-emoji: emoji; }

    /* Mobile tweaks */
    @media (max-width: 480px) {
      .header { padding: 1.5rem 1rem 1.2rem; }
      .header h1 { font-size: 1.2rem; }
      .content { padding: 1rem 0.8rem 2rem; }
      h1 { font-size: 1.15rem; }
      h2 { font-size: 1rem; }
      table { font-size: 0.8rem; }
      th, td { padding: 0.4rem 0.5rem; }
      pre { font-size: 0.75rem; padding: 0.6rem; }
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 1rem;
      font-size: 0.75rem;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>{{ site.title }}</h1>
    <p>{{ site.description }}</p>
  </div>
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
